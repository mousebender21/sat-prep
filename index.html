<html lang="en">

<title>SAT Prep - 1350+ Tracker</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: system-ui, -apple-system, sans-serif; background: #f8fafc; color: #0f172a; min-height: 100vh; padding-bottom: 70px; }
#app { max-width: 480px; margin: 0 auto; padding: 16px; }
h1 { font-size: 24px; font-weight: 800; }
h2 { font-size: 20px; font-weight: 700; margin-bottom: 16px; }
.card { background: white; border-radius: 16px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-bottom: 16px; }
.btn { display: inline-block; padding: 14px 24px; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; text-align: center; width: 100%; transition: all 0.2s; }
.btn-primary { background: linear-gradient(135deg, #0d9488, #14b8a6); color: white; }
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(13,148,136,0.3); }
.btn-outline { background: white; border: 2px solid #e2e8f0; color: #0f172a; }
.btn-outline:hover { border-color: #0d9488; color: #0d9488; }
.btn-sm { padding: 10px 16px; font-size: 14px; }
.btn-danger { background: #ef4444; color: white; }
.avatar { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 18px; color: white; flex-shrink: 0; }
.profile-btn { display: flex; align-items: center; gap: 12px; width: 100%; padding: 14px 16px; border: 2px solid #e2e8f0; border-radius: 14px; background: white; cursor: pointer; font-size: 16px; margin-bottom: 8px; text-align: left; transition: all 0.2s; }
.profile-btn:hover { border-color: #0d9488; background: #f0fdfa; }
.new-btn { padding: 14px; border: 2px dashed #cbd5e1; border-radius: 14px; background: transparent; width: 100%; cursor: pointer; color: #64748b; font-size: 15px; transition: all 0.2s; }
.new-btn:hover { border-color: #0d9488; color: #0d9488; }
input[type="text"] { width: 100%; padding: 14px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 16px; outline: none; transition: border 0.2s; }
input[type="text"]:focus { border-color: #0d9488; }
.choice { display: flex; align-items: flex-start; gap: 10px; width: 100%; padding: 14px; margin-bottom: 8px; border: 2px solid #e2e8f0; border-radius: 12px; background: white; cursor: pointer; font-size: 15px; text-align: left; transition: all 0.2s; line-height: 1.4; }
.choice:hover { border-color: #0d9488; background: #f0fdfa; }
.choice.correct { border-color: #22c55e; background: #f0fdf4; }
.choice.wrong { border-color: #ef4444; background: #fef2f2; }
.choice.disabled { pointer-events: none; opacity: 0.85; }
.choice-letter { display: flex; align-items: center; justify-content: center; width: 28px; height: 28px; border-radius: 50%; background: #f1f5f9; font-weight: 700; font-size: 13px; color: #64748b; flex-shrink: 0; }
.choice.correct .choice-letter { background: #22c55e; color: white; }
.choice.wrong .choice-letter { background: #ef4444; color: white; }
.passage-card { font-size: 14px; line-height: 1.6; padding: 16px; background: #f8fafc; border-left: 3px solid #6366f1; border-radius: 8px; margin-bottom: 16px; color: #334155; }
.pill { display: inline-block; padding: 8px 16px; border-radius: 20px; border: 2px solid #e2e8f0; background: white; font-size: 14px; font-weight: 500; cursor: pointer; margin: 0 4px 8px 0; transition: all 0.2s; }
.pill.active { background: #0d9488; color: white; border-color: #0d9488; }
.pill:hover { border-color: #0d9488; }
.bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.bar-label { font-size: 12px; font-weight: 600; color: #64748b; width: 80px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.bar { flex: 1; height: 8px; background: #f1f5f9; border-radius: 4px; overflow: hidden; }
.bar-fill { height: 100%; background: linear-gradient(90deg, #0d9488, #14b8a6); border-radius: 4px; transition: width 0.5s; }
.bar-pct { font-size: 12px; font-weight: 600; color: #0f172a; width: 36px; text-align: right; }
.stat-card { background: #f8fafc; border-radius: 12px; padding: 14px; text-align: center; }
.stat-value { font-size: 22px; font-weight: 800; color: #0d9488; }
.stat-label { font-size: 12px; color: #64748b; margin-top: 2px; }
.progress-bar { height: 6px; background: #f1f5f9; border-radius: 3px; margin-bottom: 16px; }
.progress-fill { height: 100%; background: linear-gradient(90deg, #0d9488, #14b8a6); border-radius: 3px; transition: width 0.3s; }
.nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.9); backdrop-filter: blur(12px); border-top: 1px solid #e2e8f0; display: flex; z-index: 100; padding: 8px 0 env(safe-area-inset-bottom, 8px); }
.nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 6px 0; cursor: pointer; color: #94a3b8; font-size: 11px; font-weight: 600; transition: color 0.2s; gap: 2px; }
.nav-item.active { color: #0d9488; }
.nav-icon { font-size: 22px; }
.timer-bar { position: fixed; top: 0; left: 0; right: 0; background: rgba(255,255,255,0.95); backdrop-filter: blur(8px); padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; z-index: 100; border-bottom: 1px solid #e2e8f0; display: none; }
.hidden { display: none !important; }
.text-center { text-align: center; }
.text-sm { font-size: 13px; color: #64748b; }
.mt-8 { margin-top: 8px; }
.mt-12 { margin-top: 12px; }
.mt-16 { margin-top: 16px; }
.mb-8 { margin-bottom: 8px; }
.mb-16 { margin-bottom: 16px; }
sup { vertical-align: baseline; font-size: 0.7em; line-height: 0; position: relative; top: -0.4em; margin-left: -0.15em; }
sup { font-size: 0.75em; vertical-align: super; }
sub { font-size: 0.75em; vertical-align: sub; }

.q-text, .choice { font-variant-numeric: tabular-nums; }

.frac { display: inline-flex; flex-direction: column; vertical-align: middle; text-align: center; font-size: 0.85em; line-height: 1.2; }
.frac .num { border-bottom: 1px solid currentColor; padding: 0 3px; }
.frac .den { padding: 0 3px; }

i { font-style: italic; font-family: 'Cambria Math', Georgia, serif; }

.rad { white-space: nowrap; }
.rad .radicand { text-decoration: overline; text-decoration-thickness: 1.5px; text-underline-offset: -0.1em; padding: 0 1px; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
@keyframes pulse-green { 0% { box-shadow: 0 0 0 0 rgba(34,197,94,0.4); } 70% { box-shadow: 0 0 0 10px rgba(34,197,94,0); } }
@keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } }
.fade-in { animation: fadeIn 0.25s ease-out; }
.pulse-correct { animation: pulse-green 0.5s ease-out; }
.shake-wrong { animation: shake 0.3s ease-out; }
.dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin: 2px; cursor: pointer; }
.dot-empty { background: #e2e8f0; }
.dot-answered { background: #0d9488; }
.dot-flagged { background: #f59e0b; }
.dot-current { border: 2px solid #0f172a; }
.milestone-card { position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:white;border-radius:20px;padding:32px 40px;box-shadow:0 20px 60px rgba(0,0,0,0.3);z-index:200;text-align:center;animation:fadeIn 0.3s ease-out; }
.milestone-overlay { position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.4);z-index:199;animation:fadeIn 0.2s ease-out; }
.heat-sq { width:40px;height:40px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:white;text-align:center;line-height:1.1; }
.nav-dots { display:flex;flex-wrap:wrap;gap:2px;padding:8px;justify-content:center;max-height:60px;overflow-y:auto; }
.formula-card { background:#f8fafc;border-radius:12px;padding:14px;margin-bottom:10px; }
.formula-card h4 { font-size:13px;color:#0d9488;margin-bottom:6px; }
.formula-card p { font-size:13px;line-height:1.5;color:#334155; }
.formula-card table { width:100%;border-collapse:collapse;font-size:12px;margin-top:4px; }
.formula-card th,.formula-card td { padding:4px 6px;border:1px solid #e2e8f0;text-align:center; }
.formula-card th { background:#f1f5f9;font-weight:600;color:#64748b; }
</style>
</head>

<script>
const MATH_QUESTIONS = [
// ═══════════════════════════════════════════════════════════════
  //  DOMAIN 1: ALGEBRA  (24 questions, m1–m24)
  // ═══════════════════════════════════════════════════════════════

  {
    id: "m1",
    domain: "Algebra",
    category: "Linear Equations",
    difficulty: 1,
    text: "A swimming pool contains 1,200 gallons of water. Water is being drained at a constant rate of 15 gallons per minute. Which equation represents the number of gallons of water, w, remaining in the pool after t minutes?",
    choices: [
      "w = 1,200 + 15t",
      "w = 1,200 − 15t",
      "w = 15t − 1,200",
      "w = 1,200t − 15"
    ],
    answer: 1,
    explanation: "The pool starts with 1,200 gallons and loses 15 gallons each minute. After t minutes, the amount drained is 15t. Subtract from the initial amount: w = 1,200 − 15t. Choice A incorrectly adds (the pool would be gaining water). Choice C reverses the subtraction, giving negative values for small t."
  },
  {
    id: "m2",
    domain: "Algebra",
    category: "Linear Equations",
    difficulty: 1,
    text: "If 5x − 3 = 2x + 12, what is the value of x?",
    choices: [
      "3",
      "5",
      "9",
      "15"
    ],
    answer: 1,
    explanation: "Subtract 2x from both sides: 3x − 3 = 12. Add 3 to both sides: 3x = 15. Divide both sides by 3: x = 5. Choice D (15) is the trap — it's the value of 3x before dividing by 3, a common mistake when students forget the final step."
  },
  {
    id: "m3",
    domain: "Algebra",
    category: "Solving for a Variable in a Formula",
    difficulty: 2,
    text: "The formula C = (5/9)(F − 32) converts Fahrenheit to Celsius. Which equation correctly solves for F in terms of C?",
    choices: [
      "F = (9/5)C + 32",
      "F = (5/9)C + 32",
      "F = (9/5)C − 32",
      "F = (9/5)(C + 32)"
    ],
    answer: 0,
    explanation: "Start with C = (5/9)(F − 32). Multiply both sides by 9/5: (9/5)C = F − 32. Add 32 to both sides: F = (9/5)C + 32. Choice C is the trap — it subtracts 32 instead of adding it (a common sign error when rearranging). Choice D incorrectly distributes the parentheses."
  },
  {
    id: "m4",
    domain: "Algebra",
    category: "Systems of Equations",
    difficulty: 1,
    text: "A bakery sells muffins for $3 each and scones for $4 each. On Saturday, the bakery sold a combined 50 items and made $170. How many muffins were sold?",
    choices: [
      "20",
      "30",
      "35",
      "40"
    ],
    answer: 1,
    explanation: "Let m = muffins and s = scones. Set up the system: m + s = 50 and 3m + 4s = 170. From the first equation, s = 50 − m. Substitute: 3m + 4(50 − m) = 170 → 3m + 200 − 4m = 170 → −m = −30 → m = 30. Check: 30(3) + 20(4) = 90 + 80 = 170. ✓ Choice A (20) results from an arithmetic error during solving. Choice D (40) comes from forgetting to isolate the variable completely."
  },
  {
    id: "m5",
    domain: "Algebra",
    category: "Systems of Equations",
    difficulty: 2,
    text: "2x + 3y = 19<br>x − y = 2<br><br>What is the value of x + y in the system of equations above?",
    choices: [
      "6",
      "8",
      "10",
      "12"
    ],
    answer: 1,
    explanation: "From the second equation: x = y + 2. Substitute into the first: 2(y + 2) + 3y = 19 → 2y + 4 + 3y = 19 → 5y = 15 → y = 3. Then x = 3 + 2 = 5. So x + y = 5 + 3 = 8. Check: 2(5) + 3(3) = 10 + 9 = 19 ✓ and 5 − 3 = 2 ✓. Choice A (6) is the trap — it gives the value of 2y (just the y term doubled), not x + y."
  },
  {
    id: "m6",
    domain: "Algebra",
    category: "Systems — No Solution / Infinitely Many",
    difficulty: 2,
    text: "For what value of k does the system of equations below have infinitely many solutions?<br><br>6x − 4y = 10<br>3x − 2y = k",
    choices: [
      "3",
      "5",
      "7",
      "10"
    ],
    answer: 1,
    explanation: "A system has infinitely many solutions when the two equations represent the same line. Dividing the first equation by 2 gives 3x − 2y = 5. For the second equation to be identical, we need k = 5. Any other value of k would make the lines parallel (same slope, different intercept) → no solution. Choice D (10) is the trap — it's the constant from the original equation before dividing by 2."
  },
  {
    id: "m7",
    domain: "Algebra",
    category: "Systems — Infinitely Many Solutions",
    difficulty: 3,
    text: "The system of equations below has infinitely many solutions. What is the value of a?<br><br>2x + ay = 12<br>6x − 9y = 36",
    choices: [
      "−9",
      "−3",
      "3",
      "9"
    ],
    answer: 1,
    explanation: "For infinitely many solutions, the equations must be scalar multiples of each other. Dividing the second equation by 3 gives 2x − 3y = 12. Comparing with 2x + ay = 12, the constants (12) already match and the x-coefficients match (both 2). So ay must equal −3y, meaning a = −3. Choice A (−9) is the trap — it's the y-coefficient from the original second equation before dividing by 3."
  },
  {
    id: "m8",
    domain: "Algebra",
    category: "Linear Functions — Slope Interpretation",
    difficulty: 1,
    text: "A marine biologist models the population of a coral reef fish species using the function P(t) = 340 + 28t, where t is the number of years since 2020. What does the number 28 represent in this context?",
    choices: [
      "The estimated fish population in 2020",
      "The estimated increase in fish population per year",
      "The estimated total fish population after 28 years",
      "The estimated number of years until the population doubles"
    ],
    answer: 1,
    explanation: "In the linear function P(t) = 340 + 28t, the coefficient 28 is the slope, which represents the rate of change. In context, the fish population increases by approximately 28 fish per year. The number 340 (the y-intercept) represents the initial population in 2020, which is what Choice A describes."
  },
  {
    id: "m9",
    domain: "Algebra",
    category: "Linear Functions — Budget Constraint",
    difficulty: 2,
    text: "The total cost, in dollars, to rent a kayak is modeled by C(h) = 12h + 25, where h is the number of hours rented. A customer has a budget of $85. What is the maximum number of whole hours the customer can rent the kayak?",
    choices: [
      "4",
      "5",
      "6",
      "7"
    ],
    answer: 1,
    explanation: "Set up the inequality: 12h + 25 ≤ 85. Subtract 25: 12h ≤ 60. Divide by 12: h ≤ 5. The maximum number of whole hours is 5. At 5 hours: C(5) = 12(5) + 25 = 60 + 25 = $85, which exactly meets the budget. Choice C (6) is the trap — at 6 hours the cost would be $97, exceeding the budget."
  },
  {
    id: "m10",
    domain: "Algebra",
    category: "Linear Inequalities",
    difficulty: 1,
    text: "Which value of x satisfies the inequality 4x − 7 > 13?",
    choices: [
      "3",
      "4",
      "5",
      "6"
    ],
    answer: 3,
    explanation: "Solve 4x − 7 > 13. Add 7 to both sides: 4x > 20. Divide by 4: x > 5. The only value strictly greater than 5 among the choices is 6. Note that x = 5 does NOT satisfy the inequality because it uses > (strictly greater than), not ≥. Choice A (3) results from an arithmetic error during solving. Choice C (5) comes from forgetting to isolate the variable completely."
  },
  {
    id: "m11",
    domain: "Algebra",
    category: "Linear Inequalities — Graphing",
    difficulty: 2,
    text: "Which inequality is represented by a graph showing a dashed line passing through (0, 3) and (2, 7), with the region below the line shaded?",
    choices: [
      "y < 2x + 3",
      "y ≤ 2x + 3",
      "y > 2x + 3",
      "y ≥ 2x + 3"
    ],
    answer: 0,
    explanation: "First, find the equation of the line. Slope = (7 − 3)/(2 − 0) = 4/2 = 2. The y-intercept is 3. So the line is y = 2x + 3. A dashed line means a strict inequality (not ≤ or ≥), and the region below the line means y < 2x + 3. Choice B is the trap — it uses ≤, which would require a solid line, not dashed."
  },
  {
    id: "m12",
    domain: "Algebra",
    category: "Absolute Value Equations",
    difficulty: 2,
    text: "How many distinct solutions does the equation |2x − 5| = 9 have?",
    choices: [
      "0",
      "1",
      "2",
      "3"
    ],
    answer: 2,
    explanation: "The absolute value equation |2x − 5| = 9 splits into two cases. Case 1: 2x − 5 = 9 → 2x = 14 → x = 7. Case 2: 2x − 5 = −9 → 2x = −4 → x = −2. Both solutions are valid (the right side is positive, so two solutions always exist). There are 2 distinct solutions. Choice A (0) results from an arithmetic error during solving. Choice D (3) comes from forgetting to isolate the variable completely."
  },
  {
    id: "m13",
    domain: "Algebra",
    category: "Absolute Value Inequalities",
    difficulty: 3,
    text: "A machine fills bottles of water. The target volume is 500 mL, and bottles are acceptable if the actual volume is within 3 mL of the target. Which inequality represents the set of acceptable volumes, v, in mL?",
    choices: [
      "|v − 3| ≤ 500",
      "|v − 500| ≤ 3",
      "|v + 500| ≤ 3",
      "|v − 500| ≥ 3"
    ],
    answer: 1,
    explanation: "\"Within 3 mL of the target\" means the distance between the actual volume v and 500 must be at most 3. The distance between v and 500 is |v − 500|. So |v − 500| ≤ 3, which gives 497 ≤ v ≤ 503. Choice D is the trap — using ≥ means the volume must be at least 3 mL away from target (i.e., the unacceptable bottles). Switching the inequality direction completely reverses the meaning."
  },
  {
    id: "m14",
    domain: "Algebra",
    category: "Linear Word Problems",
    difficulty: 1,
    text: "A plumber charges a flat fee of $50 plus $35 per hour of work. If a customer's total bill was $225, how many hours did the plumber work?",
    choices: [
      "4",
      "5",
      "6",
      "7"
    ],
    answer: 1,
    explanation: "Set up the equation: 50 + 35h = 225. Subtract 50 from both sides: 35h = 175. Divide by 35: h = 5. The plumber worked 5 hours. Check: 50 + 35(5) = 50 + 175 = 225 ✓. Choice A (4) results from an arithmetic error during solving. Choice D (7) comes from forgetting to isolate the variable completely."
  },
  {
    id: "m15",
    domain: "Algebra",
    category: "Systems Word Problems",
    difficulty: 2,
    text: "A swimmer practices two strokes during a 60-minute session. She swims butterfly for twice as many minutes as she swims backstroke. She also spends 6 minutes on warm-up and cool-down (not swimming either stroke). How many minutes does she spend on backstroke?",
    choices: [
      "15",
      "18",
      "20",
      "27"
    ],
    answer: 1,
    explanation: "Let b = minutes of backstroke. Then butterfly = 2b. The total session is 60 minutes: b + 2b + 6 = 60 → 3b + 6 = 60 → 3b = 54 → b = 18. So she swims 18 minutes of backstroke, 36 minutes of butterfly, and 6 minutes of warm-up/cool-down. Check: 18 + 36 + 6 = 60 ✓. Choice D (27) is the trap — it's 54/2, which would result from forgetting to include the warm-up/cool-down in the total."
  },
  {
    id: "m16",
    domain: "Algebra",
    category: "Slope from Two Points",
    difficulty: 1,
    text: "A line passes through the points (−1, 4) and (3, −8). What is the slope of the line?",
    choices: [
      "−3",
      "−1",
      "1",
      "3"
    ],
    answer: 0,
    explanation: "Slope = (y₂ − y₁)/(x₂ − x₁) = (−8 − 4)/(3 − (−1)) = −12/4 = −3. Choice D (3) is the trap — it results from forgetting the negative sign or computing the reciprocal (x₂ − x₁)/(y₂ − y₁) = 4/(−12) and then taking the wrong absolute value."
  },
  {
    id: "m17",
    domain: "Algebra",
    category: "Parallel and Perpendicular Lines",
    difficulty: 2,
    text: "Line p has the equation y = (3/4)x − 5. Line q is perpendicular to line p and passes through the point (6, 1). What is the y-intercept of line q?",
    choices: [
      "−7",
      "7",
      "9",
      "11"
    ],
    answer: 2,
    explanation: "The slope of line p is 3/4. Perpendicular lines have slopes that are negative reciprocals, so the slope of line q is −4/3. Using point-slope form with (6, 1): y − 1 = −(4/3)(x − 6) → y − 1 = −(4/3)x + 8 → y = −(4/3)x + 9. The y-intercept is 9. Choice A (−7) results from incorrectly using positive 4/3 as the slope."
  },
  {
    id: "m18",
    domain: "Algebra",
    category: "Point-Slope and Standard Form",
    difficulty: 2,
    text: "A line has a slope of −2 and passes through the point (4, 3). Which of the following is an equation of the line in standard form?",
    choices: [
      "2x + y = 11",
      "2x − y = 11",
      "2x + y = 5",
      "x + 2y = 11"
    ],
    answer: 0,
    explanation: "Using point-slope form: y − 3 = −2(x − 4) → y − 3 = −2x + 8 → y = −2x + 11. Rearranging to standard form: 2x + y = 11. Choice C (2x + y = 5) results from a distribution error: computing −2(−4) as −8 instead of +8, giving y = −2x + 5."
  },
  {
    id: "m19",
    domain: "Algebra",
    category: "Linear Function from Table",
    difficulty: 1,
    text: "The table below shows a linear relationship between x and y:<br><br>x: 1, 3, 5, 7<br>y: 2, 8, 14, 20<br><br>What is the value of y when x = 10?",
    choices: [
      "26",
      "29",
      "30",
      "32"

/* ============================================================
   NORMALIZE
   ============================================================ */
function normalize(arr) {
  for (var i = 0; i < arr.length; i++) {
    var q = arr[i];
    if (q.text && !q.question) q.question = q.text;
    if (q.choices && !q.answers) {
      q.answers = [];
      for (var c = 0; c < q.choices.length; c++) {
        var val = q.choices[c];
        q.answers.push(typeof val === 'string' ? val.replace(/^[A-D]\)\s*/, '') : String(val || ''));
      }
    }
    if (typeof q.answer === 'number' && q.correct === undefined) q.correct = q.answer;
    var mapped = DOMAIN_MAP[q.domain];
    if (mapped) { q.domainLabel = q.domain; q.domain = mapped; }
    if (typeof q.difficulty === 'number') q.difficulty = DIFF_MAP[q.difficulty] || 'medium';
    if (!q.difficulty) q.difficulty = 'medium';
  }
}

normalize(RW_QUESTIONS);

function getApp() { return document.getElementById('app'); }
function shuffle(arr) {
  var a = arr.slice();
  var seed = Date.now() + Math.random() * 10000;
  for (var i = a.length - 1; i > 0; i--) {
    seed = (seed * 9301 + 49297) % 233280;
    var j = Math.floor((seed / 233280) * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}
function defaultState() {
  var ds = {};
  for (var i = 0; i < ALL_DOMAIN_KEYS.length; i++) ds[ALL_DOMAIN_KEYS[i]] = {c:0,w:0};
  return { correct:0, wrong:0, streak:0, bestStreak:0, domainStats:ds, spacedRep:[], qotdId:null, qotdDate:null, qotdAnswered:false, settings:{sound:false,keyboard:true}, sessionHistory:[], timedHistory:[] };
}

/* ============================================================
   QOTD
   ============================================================ */
function buildQOTD() {
  if (ALL_QS.length === 0) return '';
  var today = getDayKey();
  if (!state.qotdId || state.qotdDate !== today) {
    var seed = 0;
    for (var i = 0; i < today.length; i++) seed += today.charCodeAt(i);
    state.qotdId = ALL_QS[seed % ALL_QS.length].id;
    state.qotdDate = today;
    state.qotdAnswered = false;
    saveState();
  }
  if (state.qotdAnswered) return '';
  var q = null;
  for (var j = 0; j < ALL_QS.length; j++) {
    if (ALL_QS[j].id === state.qotdId) { q = ALL_QS[j]; break; }
  }
  if (!q) return '';
  return '<div class="card" style="cursor:pointer;border:2px solid #f59e0b;background:linear-gradient(135deg,#fefce8,#fef3c7)" onclick="startQOTD()">' +
    '<div style="display:flex;align-items:center;gap:10px">' +
    '<span style="font-size:24px">&#11088;</span>' +
    '<div><div style="font-weight:700;color:#d97706">Question of the Day</div>' +
    '<div class="text-sm">Tap to answer</div></div></div></div>';
}
function startQOTD() {
  var q = null;
  for (var i = 0; i < ALL_QS.length; i++) {
    if (ALL_QS[i].id === state.qotdId) { q = ALL_QS[i]; break; }
  }
  if (!q) return;
  srQueue = [{ q: q, sr: null }];
  srIdx = 0;
  srAnswered = false;
  showSRQ();
  state.qotdAnswered = true;
  saveState();
}

/* ============================================================
   SPACED REP
   ============================================================ */
function getSRCount() {
  var now = Date.now();
  var count = 0;
  for (var i = 0; i < state.spacedRep.length; i++) {
    if (state.spacedRep[i].dueAt <= now) count++;
  }
  return count;
}
function startSR() {
  var now = Date.now();
  var due = [];
  for (var i = 0; i < state.spacedRep.length; i++) {
    if (state.spacedRep[i].dueAt <= now) {
      var q = null;
      for (var j = 0; j < ALL_QS.length; j++) {
        if (ALL_QS[j].id === state.spacedRep[i].id) { q = ALL_QS[j]; break; }
      }
      if (q) due.push({ q: q, sr: state.spacedRep[i] });
    }
  }
  if (due.length === 0) { navTo('home'); return; }
  srQueue = due;
  srIdx = 0;
  srAnswered = false;
  showSRQ();
}
function showSRQ() {
  if (srIdx >= srQueue.length) { navTo('home'); return; }
  srAnswered = false;
  var item = srQueue[srIdx];
  var q = item.q;
  var html = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">';
  html += '<button class="btn btn-outline btn-sm" style="width:auto;padding:8px 12px" onclick="navTo(' + "'home'" + ')">&#8592; Home</button>';
  html += '<span class="text-sm">Review ' + (srIdx+1) + ' of ' + srQueue.length + '</span></div>';
  if (q.passage) html += '<div class="passage-card">' + q.passage + '</div>';
  html += '<div class="card"><p style="font-weight:600;line-height:1.5;margin-bottom:16px">' + q.question + '</p>';
    var visual = getVisual(q.id); if (visual) html += '<div style="text-align:center;margin:12px 0;padding:12px;background:#f8fafc;border-radius:10px">' + visual + '</div>';
  for (var i = 0; i < q.answers.length; i++) {
    html += '<button class="choice" id="sr' + i + '" onclick="srAnswer(' + i + ')">';
    html += '<span class="choice-letter">' + String.fromCharCode(65+i) + '</span> ' + cleanMath(q.answers[i]);
    html += '</button>';
  }
  html += '</div><div id="srFeedback"></div>';
  getApp().innerHTML = html;
}
function srAnswer(idx) {
  if (srAnswered) return;
  srAnswered = true;
  var item = srQueue[srIdx];
  var q = item.q;
  var correct = idx === q.correct;
  for (var i = 0; i < q.answers.length; i++) {
    var btn = document.getElementById('sr' + i);
    if (!btn) continue;
    btn.classList.add('disabled');
    if (i === q.correct) btn.classList.add('correct');
    if (i === idx && !correct) btn.classList.add('wrong');
  }
  if (item.sr) {
    if (correct) {
      item.sr.interval = Math.min((item.sr.interval || 1) * 2, 7);
      item.sr.dueAt = Date.now() + item.sr.interval * DAY;
      if (item.sr.interval >= 7) state.spacedRep = state.spacedRep.filter(function(s){return s.id !== q.id;});
    } else {
      item.sr.interval = 1;
      item.sr.dueAt = Date.now() + DAY;
    }
    saveState();
  }
  var fb = '<div class="card mt-12">';
  fb += '<p style="font-weight:700;color:' + (correct ? '#22c55e' : '#ef4444') + '">' + (correct ? '&#10004; Correct!' : '&#10008; Incorrect') + '</p>';
  fb += '<p class="text-sm mt-8">' + (q.explanation || '') + '</p>';
  fb += '<button class="btn btn-primary mt-12" onclick="nextSR()">Next</button></div>';
  document.getElementById('srFeedback').innerHTML = fb;
}
function nextSR() { srIdx++; showSRQ(); }


function cleanMath(s) {
  if (!s) return '';
    // Convert radical patterns: √72 → styled radical with vinculum
  // Handle √(expr) first
  s = s.replace(/√\(([^)]+)\)/g, '<span class="rad">√<span class="radicand">$1</span></span>');
  // Handle √number (single or multi-digit)
  s = s.replace(/√(\d+)/g, '<span class="rad">√<span class="radicand">$1</span></span>');
  // Tighten exponents: x<sup>2</sup> → <span class="exp">x<sup>2</sup></span>
  s = s.replace(/([a-zA-Z0-9)])<sup>/g, '$1<sup style="margin-left:-0.2em;position:relative;top:-0.4em;font-size:0.7em;line-height:0">');
// Convert (expr)/(expr) fractions
  s = s.replace(/\(([^()]+)\)\s*\/\s*\(([^()]+)\)/g, function(m, num, den) {
    return '<span style="display:inline-flex;flex-direction:column;vertical-align:middle;text-align:center;line-height:1.1;margin:0 2px;font-size:0.85em"><span style="border-bottom:1px solid currentColor;padding:0 3px">' + num + '</span><span style="padding:0 3px">' + den + '</span></span>';
  });
  // Convert (expr)/number
  s = s.replace(/\(([^()]+)\)\/(\d+)/g, function(m, num, den) {
    return '<span style="display:inline-flex;flex-direction:column;vertical-align:middle;text-align:center;line-height:1.1;margin:0 2px;font-size:0.85em"><span style="border-bottom:1px solid currentColor;padding:0 3px">' + num + '</span><span style="padding:0 3px">' + den + '</span></span>';
  });
  // Convert number/(expr)
  s = s.replace(/([\d]+)\/\(([^()]+)\)/g, function(m, num, den) {
    return '<span style="display:inline-flex;flex-direction:column;vertical-align:middle;text-align:center;line-height:1.1;margin:0 2px;font-size:0.85em"><span style="border-bottom:1px solid currentColor;padding:0 3px">' + num + '</span><span style="padding:0 3px">' + den + '</span></span>';
  });
  // Convert simple number/number fractions
  s = s.replace(/(^|[\s=>,])([−\-]?(?:√\d+|\d+))\/(\d+)(?=$|[\s<.,;)"])/g, function(m, pre, num, den) {
    return pre + '<span style="display:inline-flex;flex-direction:column;vertical-align:middle;text-align:center;line-height:1.1;margin:0 2px;font-size:0.85em"><span style="border-bottom:1px solid currentColor;padding:0 3px">' + num + '</span><span style="padding:0 3px">' + den + '</span></span>';
  });
  return s;
}
/* ============================================================

function showPracticeSetup() {
  showNav();
  var html = '<h2>Practice</h2>';
  html += '<div class="mb-8"><p class="text-sm mb-8">Section</p>';
  html += '<span class="pill active" onclick="setSec(' + "'all'" + ',this)">All</span>';
  html += '<span class="pill" onclick="setSec(' + "'math'" + ',this)">&#128208; Math</span>';
  html += '<span class="pill" onclick="setSec(' + "'rw'" + ',this)">&#128214; R&W</span>';
  html += '</div>';
  html += '<div id="domainArea"></div>';
  html += '<div class="mb-8"><p class="text-sm mb-8">Difficulty</p>';
  html += '<span class="pill active" onclick="setDiff(' + "'all'" + ',this)">All</span>';
  html += '<span class="pill" onclick="setDiff(' + "'easy'" + ',this)">&#128215; Easy</span>';
  html += '<span class="pill" onclick="setDiff(' + "'medium'" + ',this)">&#128216; Medium</span>';
  html += '<span class="pill" onclick="setDiff(' + "'hard'" + ',this)">&#128213; Hard</span>';
  html += '</div>';
  html += '<p class="text-sm mb-16" id="poolCount">' + ALL_QS.length + ' questions available</p>';
  html += '<button class="btn btn-primary" onclick="startPractice()">Start Practice</button>';
  getApp().innerHTML = html;
  _pSec = 'all'; _pDiff = 'all'; _pDoms = [];
  updateDomainPills();
  updatePoolCount();
}
var _pSec = 'all', _pDiff = 'all', _pDoms = [];
function setSec(val, el) {
  _pSec = val;
  _pDoms = [];
  var pills = el.parentElement.querySelectorAll('.pill');
  for (var i = 0; i < pills.length; i++) pills[i].classList.remove('active');
  el.classList.add('active');
  updateDomainPills();
  updatePoolCount();
}
function setDiff(val, el) {
  _pDiff = val;
  var pills = el.parentElement.querySelectorAll('.pill');
  for (var i = 0; i < pills.length; i++) pills[i].classList.remove('active');
  el.classList.add('active');
  updatePoolCount();
}
function toggleDom(key, el) {
  var idx = _pDoms.indexOf(key);
  if (idx >= 0) { _pDoms.splice(idx, 1); el.classList.remove('active'); }
  else { _pDoms.push(key); el.classList.add('active'); }
  updatePoolCount();
}
function updateDomainPills() {
  var area = document.getElementById('domainArea');
  if (!area) return;
  if (_pSec === 'all') { area.innerHTML = ''; return; }
  var domains = _pSec === 'math' ? MATH_DOMAINS : RW_DOMAINS;
  var html = '<div class="mb-8"><p class="text-sm mb-8">Domain <span style="font-size:11px;color:#94a3b8">(select any)</span></p>';
  for (var i = 0; i < domains.length; i++) {
    var key = domains[i];
    var label = DOMAIN_LABELS[key] || key;
    var ds = state.domainStats[key] || {c:0,w:0};
    var dt = ds.c + ds.w;
    var dp = dt > 0 ? Math.round(ds.c / dt * 100) : 0;
    html += '<span class="pill" onclick="toggleDom(' + "'" + key + "'" + ',this)">';
    html += label;
    if (dt > 0) html += ' <span style="font-size:11px;opacity:0.7">' + dp + '%</span>';
    html += '</span>';
  }
  html += '</div>';
  area.innerHTML = html;
}
function updatePoolCount() {
  var pool = buildPool();
  var el = document.getElementById('poolCount');
  if (el) el.textContent = pool.length + ' questions available';
}
function buildPool() {
  var pool = [];
  if (_pSec === 'all' || _pSec === 'math') pool = pool.concat(MATH_QUESTIONS);
  if (_pSec === 'all' || _pSec === 'rw') pool = pool.concat(RW_QUESTIONS);
  if (activeProfile && activeProfile.major) {
    var themeMap = {
      marine: typeof THEME_MARINE !== 'undefined' ? THEME_MARINE : [],
      engineering: typeof THEME_ENGINEERING !== 'undefined' ? THEME_ENGINEERING : [],
      business: typeof THEME_BUSINESS !== 'undefined' ? THEME_BUSINESS : [],
      medicine: typeof THEME_MEDICINE !== 'undefined' ? THEME_MEDICINE : [],
      environment: typeof THEME_ENVIRONMENT !== 'undefined' ? THEME_ENVIRONMENT : [],
      sports: typeof THEME_SPORTS !== 'undefined' ? THEME_SPORTS : [],
      arts: typeof THEME_ARTS !== 'undefined' ? THEME_ARTS : []
    };
    if (themeMap[activeProfile.major]) pool = pool.concat(themeMap[activeProfile.major]);
  }
  if (_pDiff !== 'all') pool = pool.filter(function(q){ return q.difficulty === _pDiff; });
  if (_pDoms.length > 0) pool = pool.filter(function(q){ return _pDoms.indexOf(q.domain) >= 0; });
  return pool;
}
function startPractice() {
  practicePool = shuffle(buildPool());
  practiceIdx = 0;
  practiceCorrect = 0;
  practiceTotal = 0;
  practiceAnswered = false;
  adaptiveDifficulty = 'medium';
  consecutiveCorrect = 0;
  consecutiveWrong = 0;
  /* Adaptive: sort so weak-domain questions come first */
  var weakDoms = [];
  for (var wi = 0; wi < ALL_DOMAIN_KEYS.length; wi++) {
    var wk = ALL_DOMAIN_KEYS[wi];
    var wd = state.domainStats[wk] || {c:0,w:0};
    var wt = wd.c + wd.w;
    if (wt >= 3 && (wd.c / wt) < 0.6) weakDoms.push(wk);
  }
  if (weakDoms.length > 0) {
    practicePool.sort(function(a, b) {
      var aWeak = weakDoms.indexOf(a.domain) >= 0 ? 0 : 1;
      var bWeak = weakDoms.indexOf(b.domain) >= 0 ? 0 : 1;
      return aWeak - bWeak;
    });
  }
  if (practicePool.length === 0) { getApp().innerHTML = '<div class="card text-center fade-in"><p>No questions match your filters.</p><button class="btn btn-outline mt-12" onclick="navTo(' + "'home'" + ')">Home</button></div>'; return; }
  showQuestion();
}

function showQuestion() {
  if (practiceIdx >= practicePool.length || practiceIdx >= 20) { showPracticeSummary(); return; }
  practiceAnswered = false;
  practiceSelected = -1;
  /* Adaptive: try to swap in a question matching adaptiveDifficulty */
  if (practicePool[practiceIdx] && practicePool[practiceIdx].difficulty !== adaptiveDifficulty) {
    for (var si = practiceIdx + 1; si < practicePool.length && si < practiceIdx + 10; si++) {
      if (practicePool[si] && practicePool[si].difficulty === adaptiveDifficulty) {
        var tmp = practicePool[practiceIdx];
        practicePool[practiceIdx] = practicePool[si];
        practicePool[si] = tmp;
        break;
      }
    }
  }
  var q = practicePool[practiceIdx];
  var html = '<div class="progress-bar"><div class="progress-fill" style="width:' + Math.round(practiceIdx / Math.min(20, practicePool.length) * 100) + '%"></div></div>';
  html += '<p class="text-sm mb-8">Question ' + (practiceIdx+1) + ' of ' + Math.min(20, practicePool.length) + '</p>';
  if (q.passage) html += '<div class="passage-card">' + q.passage + '</div>';
  html += '<div class="card" style="border-left:3px solid ' + (isMath(q) ? '#0d9488' : '#6366f1') + '">';
  html += '<p style="font-weight:600;line-height:1.5;margin-bottom:16px" class="q-text">' + cleanMath(q.question) + '</p>';
    var visual = getVisual(q.id); if (visual) html += '<div style="text-align:center;margin:12px 0;padding:12px;background:#f8fafc;border-radius:10px">' + visual + '</div>';
  for (var i = 0; i < q.answers.length; i++) {
    html += '<button class="choice" id="pc' + i + '" onclick="practiceAnswer(' + i + ')">';
    html += '<span class="choice-letter">' + String.fromCharCode(65+i) + '</span> ' + cleanMath(q.answers[i]);
    html += '</button>';
  }
  html += '</div><div id="practiceFeedback"></div>';
  getApp().innerHTML = html;
}
function practiceAnswer(idx) {
  if (practiceAnswered) return;
  practiceAnswered = true;
  var q = practicePool[practiceIdx];
  var correct = idx === q.correct;
  practiceTotal++;
  if (correct) {
    practiceCorrect++; state.correct++; state.streak++;
    if (state.streak > state.bestStreak) state.bestStreak = state.streak;
    consecutiveCorrect++; consecutiveWrong = 0;
    if (consecutiveCorrect >= 3) {
      consecutiveCorrect = 0;
      if (adaptiveDifficulty === 'easy') adaptiveDifficulty = 'medium';
      else if (adaptiveDifficulty === 'medium') adaptiveDifficulty = 'hard';
    }
  } else {
    state.wrong++; state.streak = 0; addToSR(q.id);
    consecutiveWrong++; consecutiveCorrect = 0;
    if (consecutiveWrong >= 2) {
      consecutiveWrong = 0;
      if (adaptiveDifficulty === 'hard') adaptiveDifficulty = 'medium';
      else if (adaptiveDifficulty === 'medium') adaptiveDifficulty = 'easy';
    }
  }
  var ds = state.domainStats[q.domain];
  if (ds) { if (correct) ds.c++; else ds.w++; }
  saveState();
  for (var i = 0; i < q.answers.length; i++) {
    var btn = document.getElementById('pc' + i);
    if (!btn) continue;
    btn.classList.add('disabled');
    if (i === q.correct) { btn.classList.add('correct'); btn.classList.add('pulse-correct'); }
    if (i === idx && !correct) { btn.classList.add('wrong'); btn.classList.add('shake-wrong'); }
  }
  var fb = '<div class="card mt-12 fade-in">';
  fb += '<p style="font-weight:700;color:' + (correct ? '#22c55e' : '#ef4444') + '">' + (correct ? '&#10004; Correct!' : '&#10008; Incorrect') + '</p>';
  fb += '<p class="text-sm mt-8">' + (q.explanation || '') + '</p>';
  if (!correct) {
    fb += '<div style="margin-top:10px;padding:10px;background:#fef2f2;border-radius:8px;border-left:3px solid #ef4444">';
    fb += '<p style="font-weight:600;font-size:13px;color:#b91c1c;margin-bottom:4px">Why wrong answers fail:</p>';
    for (var wi = 0; wi < q.answers.length; wi++) {
      if (wi === q.correct || wi === idx) continue;
      var wrongLetter = String.fromCharCode(65 + wi);
      fb += '<p style="font-size:12px;color:#64748b;margin-top:3px"><b>' + wrongLetter + ')</b> ' + cleanMath(q.answers[wi]) + ' &mdash; does not satisfy the given conditions.</p>';
      break;
    }
    fb += '</div>';
  }
  fb += '<button class="btn btn-primary mt-12" onclick="nextPractice()">Next &#8594;</button></div>';
  document.getElementById('practiceFeedback').innerHTML = fb;
  checkMilestone();
}
function nextPractice() { practiceIdx++; showQuestion(); }
function addToSR(qId) {
  for (var i = 0; i < state.spacedRep.length; i++) {
    if (state.spacedRep[i].id === qId) { state.spacedRep[i].interval = 1; state.spacedRep[i].dueAt = Date.now() + DAY; return; }
  }
  state.spacedRep.push({ id: qId, interval: 1, dueAt: Date.now() + DAY });
}
function showPracticeSummary() {
  var pct = practiceTotal > 0 ? Math.round(practiceCorrect / practiceTotal * 100) : 0;
  if (!state.sessionHistory) state.sessionHistory = [];
  state.sessionHistory.push({date: new Date().toISOString().slice(0,10), pct: pct, total: practiceTotal});
  if (state.sessionHistory.length > 20) state.sessionHistory = state.sessionHistory.slice(-20);
  saveState();
  var html = '<div class="card text-center fade-in">';
  html += '<h2>Session Complete</h2>';
  html += '<div style="font-size:48px;font-weight:800;color:#0d9488;margin:16px 0">' + pct + '%</div>';

  html += '<button class="btn btn-primary mt-16" onclick="startPractice()">Practice Again</button>';
  html += '<button class="btn btn-outline mt-8" onclick="navTo(' + "'home'" + ')">Home</button>';
  html += '</div>';
  getApp().innerHTML = html;
}

function startTimedTest(mode) {
  hideNav();
  var pool, time;
  if (mode === 'math') { pool = shuffle(MATH_QUESTIONS.slice()).slice(0,22); time = 35*60; }
  else if (mode === 'rw') { pool = shuffle(RW_QUESTIONS.slice()).slice(0,27); time = 32*60; }
  else { pool = shuffle(MATH_QUESTIONS.slice()).slice(0,22).concat(shuffle(RW_QUESTIONS.slice()).slice(0,27)); time = 67*60; }
  timedQuestions = pool;
  timedAnswers = new Array(pool.length);
  timedFlags = new Array(pool.length);
  for (var i = 0; i < pool.length; i++) { timedAnswers[i] = -1; timedFlags[i] = false; }
  timedIdx = 0;
  timedTimeLeft = time;
  document.getElementById('timerBar').style.display = 'flex';
  startTimer();
  showTimedQ();
}
function startTimer() {
  if (timedTimer) clearInterval(timedTimer);
  timedTimer = setInterval(function() {
    timedTimeLeft--;
    var m = Math.floor(timedTimeLeft / 60);
    var s = timedTimeLeft % 60;
    var el = document.getElementById('timerDisplay');
    if (el) el.textContent = m + ':' + (s < 10 ? '0' : '') + s;
    if (timedTimeLeft <= 0) { clearInterval(timedTimer); timedTimer = null; endTimedTest(); }
  }, 1000);
}
function showTimedQ() {
  var q = timedQuestions[timedIdx];
  document.getElementById('timerQCount').textContent = (timedIdx+1) + '/' + timedQuestions.length;
  var html = '';
  if (q.passage) html += '<div class="passage-card">' + q.passage + '</div>';
  html += '<div class="card"><p style="font-weight:600;line-height:1.5;margin-bottom:16px">' + q.question + '</p>';
    var visual = getVisual(q.id); if (visual) html += '<div style="text-align:center;margin:12px 0;padding:12px;background:#f8fafc;border-radius:10px">' + visual + '</div>';
  for (var i = 0; i < q.answers.length; i++) {
    var sel = timedAnswers[timedIdx] === i ? ' style="border-color:#0d9488;background:#f0fdfa"' : '';
    html += '<button class="choice"' + sel + ' onclick="timedAnswer(' + i + ')">';
    html += '<span class="choice-letter">' + String.fromCharCode(65+i) + '</span> ' + cleanMath(q.answers[i]);
    html += '</button>';
  }
  html += '</div>';
  html += '<div style="display:flex;gap:8px;margin-top:12px">';
  html += '<button class="btn btn-outline btn-sm" style="flex:1" onclick="timedPrev()"' + (timedIdx === 0 ? ' disabled' : '') + '>&#8592; Prev</button>';
  html += '<button class="btn btn-outline btn-sm" style="flex:1" onclick="timedFlag()">' + (timedFlags[timedIdx] ? '&#128278; Unflag' : '&#128279; Flag') + '</button>';
  if (timedIdx < timedQuestions.length - 1) html += '<button class="btn btn-primary btn-sm" style="flex:1" onclick="timedNext()">Next &#8594;</button>';
  else html += '<button class="btn btn-primary btn-sm" style="flex:1" onclick="endTimedTest()">Finish</button>';
  html += '</div>';
  /* Navigation dots */
  html += '<div class="nav-dots" style="margin-top:10px">';
  for (var di = 0; di < timedQuestions.length; di++) {
    var dotCls = 'dot';
    if (timedFlags[di]) dotCls += ' dot-flagged';
    else if (timedAnswers[di] >= 0) dotCls += ' dot-answered';
    else dotCls += ' dot-empty';
    if (di === timedIdx) dotCls += ' dot-current';
    html += '<span class="' + dotCls + '" onclick="jumpToTimedQ(' + di + ')"></span>';
  }
  html += '</div>';
  getApp().innerHTML = html;
}
function timedAnswer(idx) { timedAnswers[timedIdx] = idx; showTimedQ(); }
function timedNext() { if (timedIdx < timedQuestions.length - 1) { timedIdx++; showTimedQ(); } }
function timedPrev() { if (timedIdx > 0) { timedIdx--; showTimedQ(); } }
function timedFlag() { timedFlags[timedIdx] = !timedFlags[timedIdx]; showTimedQ(); }
function jumpToTimedQ(idx) { timedIdx = idx; showTimedQ(); }
function endTimedTest() {
  if (timedTimer) { clearInterval(timedTimer); timedTimer = null; }
  document.getElementById('timerBar').style.display = 'none';
  showNav();
  var correct = 0, total = timedQuestions.length;
  for (var i = 0; i < total; i++) {
    if (timedAnswers[i] === timedQuestions[i].correct) correct++;
  }
  var pct = Math.round(correct / total * 100);
  /* Store timed test history */
  if (!state.timedHistory) state.timedHistory = [];
  var tMode = total <= 22 ? 'Math' : (total <= 27 ? 'R&W' : 'Full');
  state.timedHistory.push({date: new Date().toISOString().slice(0,10), mode: tMode, pct: pct, correct: correct, total: total});
  if (state.timedHistory.length > 10) state.timedHistory = state.timedHistory.slice(-10);
  saveState();
  var html = '<div class="card text-center fade-in">';
  html += '<h2>Test Complete</h2>';
  html += '<div style="font-size:48px;font-weight:800;color:#0d9488;margin:16px 0">' + pct + '%</div>';
  html += '<p class="text-sm">' + correct + ' of ' + total + ' correct</p>';
  html += '<p class="text-sm mt-8">Estimated Score: ' + Math.round(400 + (correct/total) * 1200) + '</p>';
  html += '<button class="btn btn-outline mt-16" onclick="showTimedReview()">&#128270; Review Answers</button>';
  html += '<button class="btn btn-primary mt-8" onclick="navTo(' + "'home'" + ')">Home</button>';
  html += '</div>';
  getApp().innerHTML = html;
}

  getApp().innerHTML = html;
}

/* ============================================================
   TIMED TEST REVIEW
   ============================================================ */
function showTimedReview() {
  var html = '<div class="fade-in"><h2>&#128270; Answer Review</h2>';
  for (var ri = 0; ri < timedQuestions.length; ri++) {
    var rq = timedQuestions[ri];
    var userAns = timedAnswers[ri];
    var wasCorrect = userAns === rq.correct;
    html += '<div class="card" style="border-left:3px solid ' + (wasCorrect ? '#22c55e' : '#ef4444') + '">';
    html += '<p style="font-size:12px;color:#94a3b8;margin-bottom:4px">Q' + (ri + 1) + ' &middot; ' + (rq.domain || '') + '</p>';
    html += '<p style="font-weight:600;font-size:14px;line-height:1.5;margin-bottom:10px">' + cleanMath(rq.question) + '</p>';
    for (var ci = 0; ci < rq.answers.length; ci++) {
      var letter = String.fromCharCode(65 + ci);
      var style = 'padding:6px 10px;margin-bottom:4px;border-radius:8px;font-size:13px;';
      if (ci === rq.correct) style += 'background:#f0fdf4;border:1px solid #22c55e;';
      else if (ci === userAns && !wasCorrect) style += 'background:#fef2f2;border:1px solid #ef4444;';
      else style += 'background:#f8fafc;border:1px solid #e2e8f0;';
      html += '<div style="' + style + '">';
      html += '<b>' + letter + ')</b> ' + cleanMath(rq.answers[ci]);
      if (ci === rq.correct) html += ' &#10004;';
      if (ci === userAns && !wasCorrect) html += ' &#10008; (your answer)';
      html += '</div>';
    }
    if (rq.explanation) {
      html += '<p style="font-size:12px;color:#64748b;margin-top:8px;padding:8px;background:#f8fafc;border-radius:6px">' + rq.explanation + '</p>';
    }
    html += '</div>';
  }
  html += '<button class="btn btn-primary mt-8" onclick="navTo(' + "'home'" + ')">Home</button>';
  html += '</div>';
  getApp().innerHTML = html;
  window.scrollTo(0, 0);
}

/* ============================================================
   MILESTONE CHECK
   ============================================================ */
function checkMilestone() {
  var milestones = [50, 100, 200, 500];
  for (var mi = 0; mi < milestones.length; mi++) {
    var m = milestones[mi];
    if (state.correct >= m && !milestoneShown[m]) {
      milestoneShown[m] = true;
      var overlay = document.createElement('div');
      overlay.className = 'milestone-overlay';
      overlay.id = 'milestoneOverlay';
      overlay.onclick = function() { dismissMilestone(); };
      document.body.appendChild(overlay);
      var card = document.createElement('div');
      card.className = 'milestone-card';
      card.id = 'milestoneCard';
      card.innerHTML = '<div style="font-size:48px;margin-bottom:8px">&#127942;</div>' +
        '<h3 style="color:#0d9488;margin-bottom:4px">' + m + ' Correct!</h3>' +
        '<p style="font-size:14px;color:#64748b">Amazing milestone reached!</p>' +
        '<button class="btn btn-primary btn-sm" style="margin-top:14px;width:auto;padding:10px 28px" onclick="dismissMilestone()">Awesome!</button>';
      document.body.appendChild(card);
      setTimeout(function() { dismissMilestone(); }, 4000);
      break;
    }
  }
}
function dismissMilestone() {
  var ov = document.getElementById('milestoneOverlay');
  var cd = document.getElementById('milestoneCard');
  if (ov) ov.parentNode.removeChild(ov);
  if (cd) cd.parentNode.removeChild(cd);
}

/* ============================================================
   COPY PROGRESS REPORT
   ============================================================ */
function copyProgressReport() {
  var total = state.correct + state.wrong;
  var pct = total > 0 ? Math.round(state.correct / total * 100) : 0;
  var est = getEstScore();
  var report = '=== SAT Prep Progress Report ===\n';
  report += 'Student: ' + activeProfile.name + '\n';
  report += 'Date: ' + new Date().toLocaleDateString() + '\n';
  report += 'Questions Answered: ' + total + '\n';
  report += 'Accuracy: ' + pct + '%\n';
  report += 'Est. Score: ' + est + '\n';
  report += 'Current Streak: ' + state.streak + '\n';
  report += 'Best Streak: ' + state.bestStreak + '\n\n';
  report += '--- Domain Breakdown ---\n';
  for (var i = 0; i < ALL_DOMAIN_KEYS.length; i++) {
    var key = ALL_DOMAIN_KEYS[i];
    var ds = state.domainStats[key] || {c:0,w:0};
    var dt = ds.c + ds.w;
    var dp = dt > 0 ? Math.round(ds.c / dt * 100) : 0;
    var label = DOMAIN_LABELS[key] || key;
    report += label + ': ' + (dt > 0 ? dp + '% (' + ds.c + '/' + dt + ')' : 'No data') + '\n';
  }
  if (state.timedHistory && state.timedHistory.length > 0) {
    report += '\n--- Recent Timed Tests ---\n';
    for (var ti = 0; ti < state.timedHistory.length; ti++) {
      var th = state.timedHistory[ti];
      report += th.date + ' ' + th.mode + ': ' + th.pct + '% (' + th.correct + '/' + th.total + ')\n';
    }
  }
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(report).then(function() {
      var btn = document.querySelector('[onclick="copyProgressReport()"]');
      if (btn) { btn.textContent = '\u2705 Copied!'; setTimeout(function() { btn.innerHTML = '&#128203; Copy Progress Report'; }, 2000); }
    });
  } else {
    var ta = document.createElement('textarea');
    ta.value = report;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    var btn2 = document.querySelector('[onclick="copyProgressReport()"]');
    if (btn2) { btn2.textContent = '\u2705 Copied!'; setTimeout(function() { btn2.innerHTML = '&#128203; Copy Progress Report'; }, 2000); }
  }
}

document.addEventListener('DOMContentLoaded', function() {
  loadProfiles();
  var savedId = null;
  try { savedId = localStorage.getItem('sat-active'); } catch(e){}
  if (savedId) {
    for (var i = 0; i < profiles.length; i++) {
      if (profiles[i].id === savedId) { activeProfile = profiles[i]; break; }
    }
  }
  if (activeProfile) { loadState(); showNav(); showHome(); }
  else { showProfiles(); }
});
